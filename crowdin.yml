# Crowdin configuration for Joomla ms-MY Language Pack
# https://support.crowdin.com/configuration-file/
#
# This maps Joomla CMS en-GB source files to ms-MY translation files.
# The source files come from the official Joomla CMS repository.
#
# Setup:
# 1. Create a Crowdin project at https://crowdin.com
# 2. Set source language to English (en-GB)
# 3. Add Malay (ms-MY) as target language
# 4. Connect this GitHub repository via Crowdin integration

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_API_TOKEN

preserve_hierarchy: true

files:
  # Site frontend language files
  - source: /language/ms-MY/*.ini
    translation: /language/ms-MY/%original_file_name%
    type: ini

  # Administrator language files
  - source: /administrator/language/ms-MY/*.ini
    translation: /administrator/language/ms-MY/%original_file_name%
    type: ini

  # API language files
  - source: /api/language/ms-MY/*.ini
    translation: /api/language/ms-MY/%original_file_name%
    type: ini

  # Installation language files
  - source: /installation/language/ms-MY/*.ini
    translation: /installation/language/ms-MY/%original_file_name%
    type: ini
