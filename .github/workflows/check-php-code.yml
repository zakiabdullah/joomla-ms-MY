name: Check PHP Code

on:
  pull_request:
    branches:
      - j5
      - j6
  push:
    branches:
      - j5
      - j6
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  check-php-code:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    permissions: read-all

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check PHP syntax errors for PHP 8.1
        if: matrix.php == '8.1'
        uses: StephaneBour/actions-php-lint@8.1
        with:
          dir: '.'

      - name: Check PHP syntax errors for PHP 8.2
        if: matrix.php == '8.2'
        uses: StephaneBour/actions-php-lint@8.2
        with:
          dir: '.'

      - name: Check PHP syntax errors for PHP 8.3
        if: matrix.php == '8.3'
        uses: StephaneBour/actions-php-lint@8.3
        with:
          dir: '.'

      - name: Check PHP syntax errors for PHP 8.4
        if: matrix.php == '8.4'
        uses: StephaneBour/actions-php-lint@8.4
        with:
          dir: '.'