name: Build Joomla Language Pack

on:
  push:
    branches: [j5, j6]
    tags: ['*']
  pull_request:
    branches: [j5, j6]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from pkg_ms-MY.xml
        id: version
        run: |
          VERSION=$(grep -oP '<version>\K[^<]+' pkg_ms-MY.xml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Build language pack
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            php build/build.php --lpackages --v --tagversion "${{ github.ref_name }}"
          else
            php build/build.php --lpackages --v
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms-MY_joomla_lang_full_${{ steps.version.outputs.version }}
          path: build/tmp/packages/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/tmp/packages/*.zip
          generate_release_notes: true
